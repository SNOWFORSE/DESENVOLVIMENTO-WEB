<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lista países</title>

    <style>
        body { /*aqui no body define tudo com esta o site*/
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            padding: 20px;
        }

        h1 { /*aqui no h1 é definido os titulos*/
            background-color: #8fd3c7;
            padding: 10px;
            margin-bottom: 20px;/* Espaço a baixo do titulo*/
        }


        h2 { /*Aqui define todos os subtitulos*/
            font-weight: bold;
            margin: 15px 0 5px 0;
        }

        ol {
            margin-left: 20px; /*empurra a lista para a direita*/
        }
    </style>
</head>

<body>

    <h1>Melhores destinos turísticos</h1>

    <h2>Foz do Iguaçu</h2>
    <ol>
        <li>Cataratas do Iguaçu</li>
        <li>Itaipu</li>
        <li>Argentina e Paraguai</li>
    </ol>

    <h2>Salvador</h2>

    <h2>Rio de Janeiro</h2>
    <ol type="a">
        <li>Cristo Redentor</li>
        <li>Pão de Açúcar</li>
    </ol>

    <h2>Maranhão</h2>

</body>
</html>
