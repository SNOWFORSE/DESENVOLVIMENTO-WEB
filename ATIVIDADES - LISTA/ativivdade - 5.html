<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TADS 2a</title>

    <style>
        /* Estilo geral da página */
        body {
            margin: 40px; /* Espaço externo da página */
        }

        /* Título principal */
        h1 {
            font-size: 36px; /* Tamanho grande do título */
            margin-bottom: 20px; /* Espaço abaixo do título */
        }

        /* Subtítulos dos semestres */
        h2 {
            color: #323274; /* Cor azul semelhante à imagem */
            margin-top: 30px; /* Espaço acima do subtítulo */
            margin-bottom: 15px; /* Espaço abaixo do subtítulo */
        }

        /* Caixa que envolve cada lista */
        .caixa {
            border: 1px solid #363535; /* Borda da caixa */
            background-color: #e2e2e2; /* Fundo cinza claro */
            width: 300px; /* Largura da caixa */
            padding: 20px; /* Espaço interno */
        }

        /* Lista */
        ul {
            margin: 0; /* Remove margem padrão */
            padding-left: 20px; /* Espaço das bolinhas */
        }

        /* Espaço entre os itens */
        li {
            margin-bottom: 8px; /* Espaço entre cada disciplina */
        }
    </style>
</head>

<body>

    <!-- Título principal -->
    <h1>Disciplinas</h1>

    <hr>

    <!-- Primeiro semestre -->
    <h2>1º Semestre</h2>
    <div class="caixa">
        <ul>
            <li>Desenvolvimento Web I</li>
            <li>Lógica de programação</li>
            <li>Introdução à computação</li>
            <li>Matemática aplicada</li>
        </ul>
    </div>

    <!-- Terceiro semestre -->
    <h2>3º Semestre</h2>
    <div class="caixa">
        <ul>
            <li>Desenvolvimento Web III</li>
            <li>Banco de dados</li>
            <li>Orientação à objetos</li>
            <li>Física de partículas</li>
        </ul>
    </div>

</body>
</html>
