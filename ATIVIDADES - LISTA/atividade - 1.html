<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Países para conhecer</title>

    <style>
        ol {
            color: purple; /* Aqui mudamos a cor do texto */
        }

        li::marker { /* Por que usei a tag "::marker"? porque ela é usada para selecionar apenas uma parte do texto nesse caso os números da lista. */
            color: black /* Aqui mudamos a cor dos números */
        }
    </style>
</head>
    <body>
        <h1> Países para Conhecer </h1>
        <hr>

            <ol>
                
                <li>Itália</li>
                <li>Espanha</li>
                <li>Equador</li>
                <li>Chile</li>
            </ol>
    </body>
</html>
