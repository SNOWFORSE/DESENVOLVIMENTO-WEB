<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melhores Destinos Turísticos</title>
    <style>

        body {  /*aqui no body define todo o corpo do SITE */
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            padding: 20px;
        }

        h1 { /*aqui define tudo no titulo*/
            font-size: 28px;
            margin-bottom: 30px;
            color: #000;
        }

        h2 { /*Aqui define todos os subtitulos das cidades*/
            font-size: 22px;
            margin-top: 25px;
            margin-bottom: 10px;
            color: #000;
        }

        ol { 
            margin-left: 20px; /* Aqui muda o espaço à esquerda da margem da página */
        }

        li {
            margin-bottom: 5px; /* Aqui muda o espaçamento entre as linhas da lista */
            font-size: 18px; /* Aqui aumenta o tamanho da fonte nas listas*/
        }

    </style>
</head>
<body>

    <h1>Melhores destinos turísticos</h1>

    <h2>Foz do Iguaçu</h2>
    <ol>
        <li>Cataratas do Iguaçu</li>
        <li>Itaipu</li>
        <li>Argentina e Paraguai</li>
    </ol>

    <h2>Salvador</h2>

    <h2>Rio de Janeiro</h2>
    <ol>
        <li>Cristo redentor</li>
        <li>Pão de açúcar</li>
    </ol>

    <h2>Maranhão</h2>

</body>
</html>
