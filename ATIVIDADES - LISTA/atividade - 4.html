<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TADS</title>

    <style>
        /* Estilo geral da página */
        body {
            margin: 40px; /* Espaço externo da página */
        }

        /* Título principal */
        h1 {
            font-size: 36px; /* Tamanho do texto */
            border-bottom: 2px solid black; /* Linha embaixo do título */
            padding-bottom: 10px; /* Espaço entre o texto e a linha */
            margin-bottom: 30px; /* Espaço abaixo do título */
        }

        /* Caixa que envolve a lista */
        .caixa {
            border: 1px solid #363535; /* Borda da caixa */
            background-color: #e2e2e2; /* Cor de fundo da caixa */
            width: 200px; /* Largura da caixa */
            padding: 20px; /* Espaço interno (entre texto e borda) */
        }

        /* Lista */
        ul {
            margin: 0; /* Remove espaço externo padrão */
            padding-left: 20px; /* Espaço para os marcadores (bolinhas) */
        }

        /* Itens da lista */
        li {
            margin-bottom: 10px; /* Espaço entre cada item */
        }
    </style>
</head>

<body>

    <!-- Título da página -->
    <h1>Disciplinas do 1º semestre</h1>

    <!-- Caixa que contém a lista -->
    <div class="caixa">
        <ul>
            <li>Desenvolvimento Web I</li>
            <li>Lógica de programação</li>
            <li>Introdução à computação</li>
            <li>Matemática aplicada</li>
        </ul>
    </div>

</body>
</html>
