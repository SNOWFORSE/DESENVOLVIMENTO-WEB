<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Destinos </title>
    <style>
        /* No Style será definido todo o front-end do site */
        body {
            background-color: #f0f8ff; /* Cor de fundo da página */
            margin: 40px; /* Aqui mudamos a distância da margem da página */
        }

        /* Estilização do título principal */
        h1 {
            color: #000000; /* Preto para o texto */
            border-bottom: 2px dashed #7f077f; /* Linha tracejada roxa abaixo do título */
            padding-bottom: 10px; /* Define a distância a linha tracejada e o titulo */
            font-size: 23px; /* Aqui aumentamos e diminuimos o tamanho da fonte */
        }
        
        /* Dupliquei a h1 com a tag "::first-letter" para aumentar apeas a primeira letra da frase no título*/
        h1::first-letter{
            font-size: 32px; /* Aqui aumentamos e diminuimos o tamanho da fonte */
        }

        /* Aqui editamos tudo dentro da caixa em branco que envolve a lista */
        .caixa {
            background-color: white; /* Define a cor do fundo da caixa*/
            border: 1px solid #918f8f; /* Borda cinza fina */
            border-radius: 8px; /* Cantos arredondados do quadro */
            padding: 15px; /* Aqui define o espaço dentro da caixa*/
            width: 210px; /* Ajusta a largura ao conteúdo */
        }

        /* Estilo dos nomes das cidades (os títulos em roxo) */
        h2 {
            color: #7f077f; /* Cor roxa pedida */
            font-size: 20px; /* Define o tamanho da fonte */
            margin-bottom: 1px; /* aqui serve para mudar a distância do ttulo para o texto */
            margin-top: 1px; /* Aqui serve mudar a distância do texto e a borda */
            display: inline-block; /* Faz o fundo amarelo cobrir apenas o texto */
            background-color: #fbfb2c78; /* Amarelo translúcido (efeito marca-texto) */
        }

        /* Destaque apenas no texto */
        .destaque {
            background-color: #fbfb2c78; /* Amarelo transparente */
            color: #7f077f; /* Texto roxo */
            font-weight: bold; /* Deixa a fonte em negrito */
            font-size: 20px; /* Define o tamanho da fonte */
            display: inline; /* Fundo só no tamanho do texto */
        }

        /* Estilização das listas (ol = lista ordenada) */
        ol {
            margin-top: 5px; /* Aqui serve mudar a distância do texto e a borda */
            color: #333; /* Muda a cor da letra*/
        }

        /* Itens da lista */
        li {
            margin-bottom: 5px; /* Muda a distância entre as linhas da lista */
            font-size: 18px; /* Muda o tamanho da fonte na lista*/
        }

        /* Estilo específico para a sub-lista (a e b) do Rio de Janeiro */
        .sub-lista {
            list-style-type: lower-alpha; /* Define letras minúsculas ex:(a, b, c...) */
            /* lower-alpha transforma 1, 2 em a, b */
        }
    </style>
</head>
<body>

    <h1>MELHORES DESTINOS TURÍSTICOS</h1>

    <div class="caixa">
        
        <h2>Foz do Iguaçu</h2>
        <ol>
            <li>Cataratas do Iguaçu</li>
            <li>Itaipu</li>
            <li>Argentina e Paraguai</li>
        </ol>

        <p><span class="destaque">Salvador</span></p>

        <h2>Rio de Janeiro</h2>
        <ol class="sub-lista">
            <li>Cristo Redentor</li>
            <li>Pão de Açúcar</li>
        </ol>

        <h2>Maranhão</h2>

    </div>

</body>
</html>
