<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Destinos</title>

    <style>
        /* Estilo geral da página */
        body {
            background-color: #f0f8ff; /* Fundo azul claro */
            margin: 40px;
        }

        /* Título principal */
        h1 {
            color: #7f077f; /* Cor roxa */
            border-bottom: 2px dashed #7f077f; /* Linha pontilhada roxa */
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* Caixa principal */
        .caixa {
            border: 1px solid #918f8f; /* Borda cinza */
            width: 320px;
            padding: 20px;
            border-radius: 6px;
        }

        /* Destaque apenas no texto */
        .destaque {
            background-color: #fbfb2c78; /* Amarelo transparente */
            color: #7f077f; /* Texto roxo */
            font-weight: bold;
            display: inline; /* Fundo só no tamanho do texto */
        }

        /* Lista padrão */
        ol {
            margin-top: 5px;
            margin-bottom: 15px;
        }

        /* Lista com letras */
        .letras {
            list-style-type: lower-alpha;
        }
    </style>
</head>

<body>

    <h1>Melhores destinos turísticos</h1>

    <div class="caixa">

        <p><span class="destaque">Foz do Iguaçu</span></p>
        <ol>
            <li>Cataratas do Iguaçu</li>
            <li>Itaipu</li>
            <li>Argentina e Paraguai</li>
        </ol>

        <p><span class="destaque">Salvador</span></p>

        <p><span class="destaque">Rio de Janeiro</span></p>
        <ol class="letras">
            <li>Cristo Redentor</li>
            <li>Pão de Açúcar</li>
        </ol>

        <p><span class="destaque">Maranhão</span></p>

    </div>

</body>
</html>
