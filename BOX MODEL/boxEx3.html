<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3 - Grade de Quadrados</title>
    <style>
        .container{
            display: flex; /* Também uma flexbox  para organizar seus proprios itens internos (evita aquebra de linha quando o site diminui o zoom)*/
            flex-wrap: wrap; /* Permite que os itens pulem para a  próxima linha */
            width: 800px; /* Largura total para permitir que as linhas se organizem conforme planejado */
        }

        .quadrado {
            width: 150px; /* Largura de cada quadrado */
            height: 150px; /* Altura de cada quadrado */
            border: 1px solid #5a5a5a; /* Borda cinza fina padrão */
            box-sizing: border-box; /* Garante que bordas grossas não aumentem o tamanho total de 150px */
            margin: 5px; /* Espaçamento externo entre os itens */
        }

        .circulo { border-radius: 50%; }

        .amarelo { background-color: #ffff6b; }
        .verde-claro { background-color: #adfbad; }
        .laranja { background-color: #ffc1a9; }

        .borda { border: 20px solid #72bb72; }

        .vazio {
            width: 100px; /* Largura menor para ajuste fino de espaçamento */
            height: 100px; /* Altura do elemento invisível */
            margin: 30px; /* Margem maior para compensar a diferença de tamanho dos quadrados */
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="quadrado circulo amarelo"></div>
        <div class="quadrado borda"></div>
        <div class="quadrado verde-claro"></div>
        <div class="quadrado"></div>
        <div class="vazio"></div>

        <div class="quadrado amarelo"></div>
        <div class="quadrado circulo verde-claro"></div>
        <div class="quadrado borda"></div>
        <div class="vazio"></div>
        <div class="quadrado laranja"></div>

        <div class="quadrado verde-claro"></div>
        <div class="quadrado"></div>
        <div class="quadrado circulo"></div>
        <div class="quadrado borda"></div>
        <div class="vazio"></div>
    </div>

</body>
</html>
