<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1 - Grade de Quadrados</title>
    <style>
        .container {
            display: flex; /* Também uma flexbox  para organizar seus proprios itens internos (evita aquebra de linha quando o site diminui o zoom)*/
            flex-wrap: wrap; /* Se os itens não couberem na largura, eles "pulam" para a linha de baixo */
            width: 480px; /* Define a largura total da grade (soma de 3 quadrados + margens) */
        }

        .quadrado {
            width: 150px; /* Largura individual de cada item */
            height: 150px; /* Altura individual de cada item */
            border: 1px solid #5a5a5a; /* Borda fina para dar contorno aos quadrados */
            box-sizing: border-box; /* box-sizing garante que a borda e o padding não aumentem o tamanho total do item (continua 150px) */
            margin: 5px; /* Espaço entre um quadrado e outro */
        }

        .amarelo {
            background-color: #ffff6b;
        }

        .verde-claro {
            background-color: #adfbad;
        }

        .laranja {
            background-color: #ffc1a9;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="quadrado amarelo"></div>
        <div class="quadrado"></div>
        <div class="quadrado verde-claro"></div>

        <div class="quadrado amarelo"></div>
        <div class="quadrado verde-claro"></div>
        <div class="quadrado laranja"></div>

        <div class="quadrado verde-claro"></div>
        <div class="quadrado"></div>
        <div class="quadrado"></div>
    </div>

</body>
</html>
