<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4 - Grade de Quadrados</title>
    <style>
        .container {
            display: flex; /* Também uma flexbox  para organizar seus proprios itens internos (evita aquebra de linha quando o site diminui o zoom)*/
            flex-wrap: wrap; /* Permite que os itens pulem para a  próxima linha */
            width: 480px; /* Define uma largura fixa para o conjunto total*/
        }

        .coluna {
            display: flex; /* Também uma flexbox  para organizar seus proprios itens internos (evita aquebra de linha quando o site diminui o zoom)*/
            flex-direction: column; /* Alinha os circulos verticalmente (um embaixo do outro)*/
            padding: 10px; /* Cria um espaço interno para a cor de fundo nao colar nos circulos*/
        }

        .destaque{ background-color: #ddcaf8; } /* cor do quadrado roxo no fundo */

        .circulo {
            border-radius: 50%; /* aqui deixa o elemento perfeitamente redondo*/
            width: 100px; /* Largura do circulo */
            height: 100px; /* Altura do circulo*/
            border: 1px solid #5a5a5a; /* Borda fina cinza ao redor */
            margin: 10px 5px; /* Espaçamento externo 10px em cima/baixo e 5px nas laterais*/
            box-sizing: border-box; /* Garante que a borda não aumente o tamanho total (100px) do circulo*/
        }

        .amarelo { background-color: #ffff6b; } /* cor dos circulos amarelos*/
        .verde-claro { background-color: #adfbad; } /* cor dos circulos verdes*/

    </style>
</head>
<body>
    
    <div class="container">
        <div class="coluna">
            <div class="quadrado circulo amarelo"></div>
            <div class="quadrado circulo amarelo"></div>
            <div class="quadrado circulo verde-claro"></div>
        </div>

        <div class="coluna destaque">
            <div class="quadrado circulo verde-claro"></div>
            <div class="quadrado circulo verde-claro"></div>
            <div class="quadrado circulo verde-claro"></div>
        </div>

        <div class="coluna">
            <div class="quadrado circulo amarelo"></div>
            <div class="quadrado circulo verde-claro"></div>
            <div class="quadrado circulo amarelo"></div>
        </div>
    </div>

</body>
</html>
