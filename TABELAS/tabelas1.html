<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    
    table {
        border-collapse: collapse;
        margin: auto;
    }
    td{
        border: 1px solid black;
        padding: 15px;
        text-align: center;
        margin: 20px;

    }
    img {
        width: 80px;
        height: auto;
        display: block;
        margin: 0 auto;
    }

    span{
        color: red;
    }

    .destaque{
        color: blue
    }


</style>

<body>
    
    <table>
        <tr>
            <th colspan="3">Distâncias em relaçaõ ao <span>Sol</span></th>
        </tr>
        <tr>
            <th>Planeta</th>
            <th>Nome</th>
            <th>Distância</th>
        </tr>
        <tr>
            <td><img src="Terra"></td>
            <td> Terra </td>
            <td> <span class="destaque">1 AU</span> </td>
        </tr>
        <tr>
            <td><img src="Vênus"></td>
            <td> Vênus </td>
            <td> O.72 AU </td>
        </tr>
        <tr>
            <td><img src="Marte"></td>
            <td> Marte </td>
            <td> 1.52 AU </td>
        </tr>
        <tr>
            <td><img src="Jupiter"></td>
            <td> Jupiter </td>
            <td> 5.20 AU </td>
        </tr>
        <tr>   
            <td><img src="saturno"></td>
            <td> Saturno </td>
            <td> 9.58 AU </td>
        </tr>
    </table>
</body>
</html>
