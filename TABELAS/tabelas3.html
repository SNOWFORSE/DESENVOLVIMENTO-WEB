<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
    
        body {
            font-family: Arial, sans-serif; /* Define uma fonte limpa e sem serifa */
            padding: 20px; /* Cria um respiro de 20px em volta de todo o conteúdo */
        }

         .titulo-secao {
            font-size: 24px; /* Define o tamanho da fonte como 24 pixels */
            font-weight: bold; /* Deixa o texto em negrito */
            margin-bottom: 5px; /* Adiciona um pequeno espaço de 5px abaixo do título */
        }

         .sub-titulo {
            font-size: 16px; /* Define o tamanho da fonte como 16 pixels */
            font-weight: bold; /* Deixa o texto em negrito */
            margin-bottom: 20px; /* Adiciona um espaço de 20px para separar da tabela */
        }

         table {
            border-collapse: collapse; /* Faz com que as bordas adjacentes se tornem uma só */
            width: 500px; /* Define a largura total da tabela como 500px */
            border-top: 2px solid #7FB3D5; /* Cria a borda superior mais grossa e azulada */
            border-left: none; /* Remove a borda lateral esquerda externa */
            border-right: none; /* Remove a borda lateral direita externa */
        }

         td {
            border: 1px solid #7FB3D5; /* Aplica borda fina azulada em todos os lados da célula */
            padding: 15px; /* Cria um espaçamento interno de 15px para o texto */
            font-size: 16px; /* Define o tamanho da fonte do conteúdo */
            color: #333; /* Define a cor do texto como um cinza escuro */
        }

         td:first-child {
            font-weight: bold; /* Deixa o texto descritivo em negrito */
            text-align: left; /* Garante que o texto fique alinhado à esquerda */
            width: 50%; /* Faz esta coluna ocupar exatamente metade da largura total */
            border-left: none; /* Remove a borda física do lado esquerdo para efeito visual */
        }

        td:not(:first-child) {
            text-align: center; /* Centraliza os números ou valores */
        }

        tr td:last-child {
            border-right: none; /* Remove a borda física do lado direito para efeito visual */
        }

        p {
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="titulo-secao">3) ESTABELECIMENTOS</div>
    <div class="sub-titulo">Print:</div>

    <table>
        <tr>
            <td>Total</td>
            <td>953.260</td>
            <td>721.291</td>
        </tr>
        <tr>
            <td>Estabelecimento <p>de ensino</p></td>
            <td>7.875</td>
            <td>6.444</td>
        </tr>
        <tr>
            <td>Estabelecimento <p>de saúde</p></td>
            <td>2.780</td>
            <td>2.507</td>
        </tr>
        <tr>
            <td>Estabelecimento <p>religioso</p></td>
            <td>50.729</td>
            <td>38.393</td>
        </tr>
        <tr>
            <td>Estabelecimento agropecuário</td>
            <td>938</td>
            <td>629</td>
        </tr>
    </table>

</body>
</html>
